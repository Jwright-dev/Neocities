            <div id="flex">              
                <main>
                    <h1>Pictures</h1>
                    <p><strong>Photo Gallery</strong></p>
                    <div id="photoGallery" class="photo-gallery">
                        <div class="gallery-frame">
                            <button id="prevPhoto" class="gallery-arrow" aria-label="Previous image">←</button>
                            <div class="gallery-main">
                                <img id="mainPhoto" src="https://via.placeholder.com/900x550/5e4e8c/ffffff?text=Photo+1" alt="Main gallery photo">
                            </div>
                            <button id="nextPhoto" class="gallery-arrow" aria-label="Next image">→</button>
                        </div>
                        <div id="galleryThumbs" class="gallery-thumbs"></div>
                    </div>
                </main>
                <script>
                    const photos = [
                        'https://jwrightdev.neocities.org/assets/image1.png',
                        'https://jwrightdev.neocities.org/assets/image2.png',
                        'https://jwrightdev.neocities.org/assets/image3.png',
                    ];

                    const mainPhoto = document.getElementById('mainPhoto');
                    const thumbsContainer = document.getElementById('galleryThumbs');
                    const prevPhoto = document.getElementById('prevPhoto');
                    const nextPhoto = document.getElementById('nextPhoto');
                    let currentIndex = 0;

                    function updateGallery(index) {
                        currentIndex = (index + photos.length) % photos.length;
                        mainPhoto.src = photos[currentIndex];
                        mainPhoto.alt = `Photo ${currentIndex + 1}`;
                        document.querySelectorAll('.gallery-thumb').forEach((thumb, thumbIndex) => {
                            thumb.classList.toggle('active', thumbIndex === currentIndex);
                        });
                    }

                    photos.forEach((photo, index) => {
                        const thumb = document.createElement('img');
                        thumb.src = photo;
                        thumb.alt = `Thumbnail ${index + 1}`;
                        thumb.className = 'gallery-thumb';
                        thumb.addEventListener('click', () => updateGallery(index));
                        thumbsContainer.appendChild(thumb);
                    });

                    prevPhoto.addEventListener('click', () => updateGallery(currentIndex - 1));
                    nextPhoto.addEventListener('click', () => updateGallery(currentIndex + 1));
                    updateGallery(0);
                </script>
